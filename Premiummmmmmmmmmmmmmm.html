<style>
:root{--gold2:#60b4ff;--dark:#03060f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,109,212,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,109,212,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(26,109,212,0.18),transparent);top:-150px;left:-150px;animation:o1 12s ease-in-out infinite;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(26,109,212,0.12),transparent);bottom:-120px;right:-100px;animation:o2 14s ease-in-out infinite;}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,50px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:rgba(26,109,212,0.5);animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:.2}100%{transform:translateY(-100vh) translateX(var(--tx,20px));opacity:0}}
.card{position:relative;z-index:2;width:min(400px,92vw);background:rgba(3,8,20,0.82);backdrop-filter:blur(30px);border:1px solid rgba(26,109,212,0.22);border-radius:28px;padding:44px 32px 40px;text-align:center;animation:cardIn 1s cubic-bezier(0.16,1,0.3,1) both;box-shadow:0 0 0 1px rgba(26,109,212,0.08),0 30px 80px rgba(0,0,0,0.8),0 0 120px rgba(26,109,212,0.1),inset 0 -1px 0 rgba(26,109,212,0.08);}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(26,109,212,0.7),rgba(255,255,255,0.12),rgba(26,109,212,0.7),transparent);border-radius:50%;}
@keyframes cardIn{from{opacity:0;transform:translateY(50px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}
.avatar-wrap{position:relative;display:inline-block;margin-bottom:28px;animation:popIn 0.9s 0.2s cubic-bezier(0.16,1,0.3,1) both,float 4s 1.2s ease-in-out infinite;}
.avatar-wrap img{width:130px;height:130px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid rgba(26,109,212,0.6);box-shadow:0 0 0 6px rgba(26,109,212,0.07),0 0 40px rgba(26,109,212,0.45),0 0 80px rgba(26,109,212,0.18);display:block;}
.ring-1{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid transparent;border-top-color:rgba(26,109,212,0.95);border-right-color:rgba(26,109,212,0.2);animation:spin 3.5s linear infinite;}
.ring-2{position:absolute;inset:-18px;border-radius:50%;border:1px solid transparent;border-bottom-color:rgba(96,180,255,0.5);border-left-color:rgba(96,180,255,0.15);animation:spin 6s linear infinite reverse;}
.dot{position:absolute;bottom:7px;right:7px;width:14px;height:14px;background:#3b9eff;border-radius:50%;border:2px solid var(--dark);box-shadow:0 0 10px #3b9eff;animation:dotPulse 2s ease-in-out infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes dotPulse{0%,100%{box-shadow:0 0 8px #3b9eff}50%{box-shadow:0 0 20px #3b9eff,0 0 35px rgba(26,109,212,0.5)}}
.badge{display:inline-block;background:linear-gradient(135deg,rgba(26,109,212,0.15),rgba(26,109,212,0.05));border:1px solid rgba(96,180,255,0.35);color:var(--gold2);font-size:9px;font-weight:700;letter-spacing:3.5px;padding:5px 16px;border-radius:100px;text-transform:uppercase;margin-bottom:12px;animation:fadeUp 0.6s 0.35s ease both;}
.name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;letter-spacing:2px;margin-bottom:6px;background:linear-gradient(135deg,#fff 20%,var(--gold2) 60%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp 0.6s 0.4s ease both;}
.divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,#1a6fd4,transparent);margin:14px auto 22px;animation:fadeUp 0.6s 0.5s ease both;}
.msg-box{background:rgba(26,109,212,0.05);border:1px solid rgba(26,109,212,0.14);border-radius:16px;padding:22px 20px;margin-bottom:30px;animation:fadeUp 0.6s 0.6s ease both;position:relative;overflow:hidden;}
.msg-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(26,109,212,0.3),transparent);}
.msg-text{font-size:clamp(14px,3.8vw,16px);line-height:1.9;color:rgba(255,255,255,0.82);font-weight:400;letter-spacing:0.3px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#0d4fa3 0%,#1a6fd4 45%,#0a3d80 100%);color:#fff;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;padding:18px 40px;border-radius:14px;text-decoration:none;border:none;cursor:pointer;position:relative;overflow:hidden;animation:fadeUp 0.6s 0.7s ease both,btnGlow 3s 1.5s ease-in-out infinite;transition:transform 0.2s,filter 0.2s;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 30px rgba(26,109,212,0.4),0 2px 10px rgba(0,0,0,0.5);}
.btn::before{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transform:skewX(-20deg);animation:shine 3.5s 1.5s ease-in-out infinite;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
@keyframes shine{0%,100%{left:-80%}50%{left:130%}}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 24px rgba(26,109,212,0.35),0 2px 10px rgba(0,0,0,0.5)}50%{box-shadow:0 4px 55px rgba(26,109,212,0.65),0 0 90px rgba(26,109,212,0.22)}}
.footer-note{margin-top:18px;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.15);text-transform:uppercase;animation:fadeUp 0.6s 0.8s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
